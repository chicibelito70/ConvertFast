services:
  # Backend API
  api:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: always

  # Redis Database
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - api
